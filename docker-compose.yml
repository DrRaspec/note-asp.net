services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: notesapp-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Your_strong_Password123!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -Q \"SELECT 1\" -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/NotesApi/Dockerfile
    container_name: notesapp-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=NotesAppDb;User Id=sa;Password=Your_strong_Password123!;TrustServerCertificate=True;Encrypt=False;
      - Jwt__Key=ChangeThisToAReallyLongSecureKeyForDevelopmentOnly12345!
      - Jwt__Issuer=NotesApi
      - Jwt__Audience=NotesClient
      - Jwt__ExpiresMinutes=120
      - Jwt__RefreshExpiresDays=7
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    container_name: notesapp-frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqlserver_data:
